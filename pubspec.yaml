name: total_athlete
description: "Total Athlete is a powerful mobile-first fitness app designed for serious lifters, offering data-driven workout tracking and advanced training analytics to help you crush your strength goals."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  audioplayers: ^6.0.0
  firebase_crashlytics: ^5.0.0
  firebase_core: '>=2.21.1'
  excel: ^4.0.0
  csv: ^6.0.0
  file_picker: '>=8.1.2'
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0
  shared_preferences: ^2.0.0
  fl_chart: 0.68.0
  intl: 0.20.2
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: assets/icons/app_icon.png
